
{% extends 'home/base.html' %}

{% block title %}Streams{% endblock %}

{% block content %}

<div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold">Streams</h2>

    <a href="{% url 'stream-create' %}"
       class="bg-green-600 text-white px-4 py-2 rounded">
        + Add Class
    </a>

    <a href="{% url 'class-subject-create' %}"
       class="bg-green-600 text-white px-4 py-2 rounded">
        + Add Subject
    </a>
</div>

<table class="w-full bg-white shadow rounded">
    <thead class="bg-gray-200">
        <tr>
            <th class="p-2 text-left">Class Name</th>
            <th class="p-2 text-left"> Class Students</th>
            <th class="p-2 text-left"> Class Subjects</th>
            <th class="p-2 text-left">Actions</th>
            
        </tr>
    </thead>

    <tbody>
        {% for stream in object_list %}
        <tr class="border-t">
            <td class="p-2"><a href="{% url 'class-performance' stream.id %}" >{{ stream.name }}</a> </td>
            <td class="p-2 text-xl"><a href="{% url 'class-students' stream.id %}">🏹</a> </td>
            <td class="p-2 text-xl"><a href="{% url 'class-subjects' stream.id %}">↗️</a> </td>
            

            <td class="p-2 space-x-2">
                <a href="{% url 'update-stream' stream.id %}"
                   class="text-blue-600">Edit</a>

                <a href="{% url 'delete-stream' stream.id %}"
                   class="text-red-600">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
