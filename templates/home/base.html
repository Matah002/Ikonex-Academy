<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ikonex Academy Dashboard{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

   
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-gray-100">

<div class="flex h-screen">


    <aside class="w-64 bg-gradient-to-b from-blue-900 to-blue-700 text-white p-5">

        <h1 class="text-2xl font-bold mb-8">
            🎓 IkonexPortal
        </h1>

        <nav class="space-y-4">

            <a href="{% url 'dashboard' %}" class="block hover:bg-blue-800 p-2 rounded">
                <i class="fa fa-chart-line mr-2"></i> Dashboard
            </a>

            <a href="{% url 'student-list' %}" class="block hover:bg-blue-800 p-2 rounded">
                <i class="fa fa-user-graduate mr-2"></i> Students
            </a>

            <a href="{% url 'subject-list' %}" class="block hover:bg-blue-800 p-2 rounded">
                <i class="fa fa-book mr-2"></i> Subjects
            </a>

            <a href="{% url 'stream-list' %}" class="block hover:bg-blue-800 p-2 rounded">
                <i class="fa fa-school mr-2"></i> Streams
            </a>

            <a href="{% url 'assessment-list' %}" class="block hover:bg-blue-800 p-2 rounded">
                <i class="fa fa-clipboard-list mr-2"></i> Assessments
            </a>

        </nav>
    </aside>

    
    <div class="flex-1 flex flex-col">

        
        <header class="bg-white shadow p-4 flex justify-between items-center">

            <input type="text"
                   placeholder="Search students, subjects..."
                   class="w-1/2 p-2 border rounded-lg focus:outline-none focus:ring">

            <div class="flex items-center space-x-4">
                <span class="text-gray-600">Admin</span>
                <div class="w-10 h-10 bg-blue-600 rounded-full"></div>
            </div>

        </header>

       
        <main class="p-6 overflow-y-auto">

            {% block content %}
            {% endblock %}

        </main>

    </div>

</div>

</body>
</html>
